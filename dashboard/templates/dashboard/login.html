<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RBAC Admin Dashboard - Secure Login">
    <title>Login — RBAC Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --bg: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.15);
            --danger: #ef4444;
            --success: #10b981;
            --radius: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(37, 99, 235, 0.15), transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(16, 185, 129, 0.1), transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(139, 92, 246, 0.08), transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
        }
        @keyframes bgShift {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.1) rotate(2deg); }
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }
        .login-logo svg {
            width: 28px;
            height: 28px;
            color: white;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .login-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 36px;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
            outline: none;
        }
        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        .form-input::placeholder {
            color: #475569;
        }
        .form-input.error {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        .error-message {
            display: none;
            color: var(--danger);
            font-size: 12px;
            margin-top: 6px;
            padding: 8px 12px;
            background: rgba(239, 68, 68, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.15);
        }
        .error-message.show {
            display: block;
            animation: shakeIn 0.3s ease;
        }
        @keyframes shakeIn {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }
        .login-btn:hover {
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }
        .login-btn.loading .btn-text { display: none; }
        .login-btn.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .login-footer a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 500;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(37, 99, 235, 0.3);
            border-radius: 50%;
            pointer-events: none;
        }
        .particle:nth-child(1) { top: 20%; left: 10%; animation: float 6s ease-in-out infinite; }
        .particle:nth-child(2) { top: 60%; left: 85%; animation: float 8s ease-in-out infinite 1s; }
        .particle:nth-child(3) { top: 80%; left: 30%; animation: float 7s ease-in-out infinite 2s; width: 6px; height: 6px; background: rgba(16, 185, 129, 0.2); }
        .particle:nth-child(4) { top: 30%; left: 70%; animation: float 9s ease-in-out infinite 0.5s; width: 3px; height: 3px; }
        .particle:nth-child(5) { top: 50%; left: 50%; animation: float 5s ease-in-out infinite 3s; width: 5px; height: 5px; background: rgba(139, 92, 246, 0.2); }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.5; }
            50% { transform: translateY(-30px) translateX(15px); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Sign in to the RBAC Admin Dashboard</p>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="admin@example.com"
                        autocomplete="email"
                        required
                    >
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >
                </div>
                <div id="loginError" class="error-message"></div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="login-footer">
                Don't have an account? <a href="#" id="registerLink">Contact your admin</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('loginError');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');

            // Reset
            errorEl.classList.remove('show');
            emailInput.classList.remove('error');
            passwordInput.classList.remove('error');

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Client-side validation
            if (!email) {
                emailInput.classList.add('error');
                errorEl.textContent = 'Please enter your email address';
                errorEl.classList.add('show');
                return;
            }
            if (!password) {
                passwordInput.classList.add('error');
                errorEl.textContent = 'Please enter your password';
                errorEl.classList.add('show');
                return;
            }

            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/auth/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || 'Login failed');
                }

                // Store tokens
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('refresh_token', data.refresh);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Redirect to dashboard
                window.location.href = '/';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.add('show');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
